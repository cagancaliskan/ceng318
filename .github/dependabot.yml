# Keep dependencies and GitHub Actions up to date automatically.
# https://docs.github.com/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # JavaScript / React Native dependencies.
  # Activates once a package manifest + lockfile exist at the repo root.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
    groups:
      # Batch low-risk dev tooling bumps into a single PR to reduce noise.
      dev-dependencies:
        dependency-type: "development"

  # GitHub Actions used by our workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "ci"
    labels:
      - "ci"
