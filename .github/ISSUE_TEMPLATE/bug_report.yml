name: 🐛 Bug report
description: Report something that isn't working
title: "fix: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: Thanks for filing a bug! Please search existing issues first to avoid duplicates.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Tap ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      multiple: true
      options:
        - iOS
        - Android
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device / OS version
      placeholder: "iPhone 15, iOS 17.5 / Pixel 7, Android 14"
  - type: input
    id: version
    attributes:
      label: App version / commit SHA
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste relevant logs or drag in screenshots.
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight
      options:
        - label: I searched existing issues and this isn't a duplicate
          required: true
